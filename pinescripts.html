        // Display all strategies on page load

        // Display strategies in the table
        function displayStrategies(strategiesToDisplay) {
            const tbody = document.getElementById('strategies-body');
            tbody.innerHTML = '';
            
            strategiesToDisplay.forEach(strategy => {
                const row = document.createElement('tr');
                
                // Determine timeframe class for styling
                let timeframeClass = strategy.timeframe;
                let timeframeDisplay = '';
                switch(strategy.timeframe) {
                    case 'day': timeframeDisplay = 'Daily'; break;
                    case 'week': timeframeDisplay = 'Weekly'; break;
                    case 'month': timeframeDisplay = 'Monthly'; break;
                    default: timeframeDisplay = 'Other'; timeframeClass = 'other'; break;
                }
                
                // Format amount with commas
                const formattedAmount = '$' + strategy.amount.toLocaleString();
                
                row.innerHTML = `
                    <td>${strategy.id}</td>
                    <td><a href="${strategy.link}">${strategy.title}</a></td>
                    <td><span class="timeframe-tag ${timeframeClass}">${timeframeDisplay}</span></td>
                    <td>${formattedAmount}</td>
                `;
                
                tbody.appendChild(row);
            });
        }

        // Filter strategies based on search and dropdowns
        function filterStrategies() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const timeframeFilter = document.getElementById('timeframe-filter').value;
            const amountFilter = parseInt(document.getElementById('amount-filter').value) || 0;
            
            const filtered = strategies.filter(strategy => {
                // Search term matching
                const matchesSearch = strategy.title.toLowerCase().includes(searchTerm);
                
                // Timeframe filtering
                const matchesTimeframe = !timeframeFilter || strategy.timeframe === timeframeFilter;
                
                // Amount filtering
                const matchesAmount = !amountFilter || strategy.amount >= amountFilter;
                
                return matchesSearch && matchesTimeframe && matchesAmount;
            });
            
            displayStrategies(filtered);
        }

        // Sort table columns
        let currentSortColumn = -1;
        let sortDirection = 1; // 1 for ascending, -1 for descending
        
        function sortTable(columnIndex) {
            const tbody = document.getElementById('strategies-body');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            // Remove previous sort indicators
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });
            
            // If clicking the same column, reverse direction
            if (currentSortColumn === columnIndex) {
                sortDirection *= -1;
            } else {
                currentSortColumn = columnIndex;
                sortDirection = 1;
            }
            
            // Add sort indicator to current column
            const th = document.querySelectorAll('th')[columnIndex];
            th.classList.add(sortDirection === 1 ? 'sort-asc' : 'sort-desc');
            
            rows.sort((a, b) => {
                const aValue = a.cells[columnIndex].textContent;
                const bValue = b.cells[columnIndex].textContent;
                
                // Special handling for ID column (numeric)
                if (columnIndex === 0) {
                    return (parseInt(aValue) - parseInt(bValue)) * sortDirection;
                }
                // Special handling for Amount column (extract numeric value)
                else if (columnIndex === 3) {
                    const aNum = parseInt(aValue.replace(/\D/g, ''));
                    const bNum = parseInt(bValue.replace(/\D/g, ''));
                    return (aNum - bNum) * sortDirection;
                }
                // Default text comparison
                else {
                    return aValue.localeCompare(bValue) * sortDirection;
                }
            });
            
            // Rebuild the table with sorted rows
            rows.forEach(row => tbody.appendChild(row));
        }
