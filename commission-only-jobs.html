            // Add jobs for this category
            category.jobs.forEach((jobTitle, jobIndex) => {
                const row = document.createElement('tr');

                const categoryShort = category.name.split(' ')[0];
                
                row.innerHTML = `

                    <td class="job-title">${jobTitle}</td>
